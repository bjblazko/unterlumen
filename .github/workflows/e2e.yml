name: E2E Tests

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg libheif-examples libimage-exiftool-perl

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache: true
          cache-dependency-path: src/go.sum

      - name: Build binary
        run: cd src && go build -o ../unterlumen .

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install npm deps
        run: cd e2e && npm ci

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Download test fixtures
        run: cd e2e && npm run setup

      - name: Diagnose tool availability
        run: |
          ffmpeg -version | head -1
          heif-convert --version || true
          exiftool -ver || true
          HIF=e2e/fixtures/photos/folder-a/a1/2026-04-24_X-T50-XF23mmF2-R-WR-DSCF6850.hif
          heif-convert "$HIF" /tmp/heic-test.jpg && echo "heif-convert OK" || echo "heif-convert FAILED"
          ffmpeg -i "$HIF" 2>&1 | grep -i "Stream\|heif\|error" | head -5 || true

      - name: Run E2E tests
        run: cd e2e && npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
