name: E2E Tests

on:
  push:
    branches: ["**"]
    paths:
      - "src/**"
      - "e2e/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg and libheif
        run: sudo apt-get install -y ffmpeg libheif-examples

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache: true
          cache-dependency-path: src/go.sum

      - name: Build binary
        run: cd src && go build -o ../unterlumen .

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install npm deps
        run: cd e2e && npm ci

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Download test fixtures
        run: cd e2e && npm run setup

      - name: Diagnose HEIC conversion
        run: |
          heif-convert --version || true
          heif-convert e2e/fixtures/heic-sample.heic /tmp/heic-test.jpg && echo "heif-convert OK" || echo "heif-convert FAILED: exit $?"
          ls -lh /tmp/heic-test*.jpg 2>/dev/null || echo "no output files found"
          ffmpeg -version | head -1
          ffmpeg -i e2e/fixtures/heic-sample.heic 2>&1 | grep -i "heif\|heic\|Stream\|error" | head -10 || true

      - name: Run E2E tests
        run: cd e2e && npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
