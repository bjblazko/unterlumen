<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unterlumen</title>
    <script>
        (function() {
            var p = localStorage.getItem('theme') || 'auto';
            var dark = p === 'dark' || (p === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        })();
    </script>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
</head>
<body>
    <header class="header">
        <h1><svg class="header-logo" viewBox="0 0 36 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <rect x="0" y="0" width="25" height="4" fill="currentColor"/>
    <rect x="26" y="0" width="10" height="4" fill="currentColor" fill-opacity="0.3"/>
    <polygon points="0,8 36,8 18,28" fill="#d35400"/>
</svg>Unterlumen</h1>
        <div class="header-right">
            <nav class="workflow">
                <button class="workflow-step active" id="mode-browse">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="1" y="1" width="4" height="4" rx="0.5"/><rect x="7" y="1" width="4" height="4" rx="0.5"/>
                        <rect x="1" y="7" width="4" height="4" rx="0.5"/><rect x="7" y="7" width="4" height="4" rx="0.5"/>
                    </svg>
                    <span class="workflow-label">Select</span>
                </button>
                <button class="workflow-step" id="mode-wastebin">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="1.5" y1="3" x2="10.5" y2="3"/>
                        <path d="M4 3V2a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1"/>
                        <path d="M10 3l-.75 7a.75.75 0 0 1-.75.75H3.5A.75.75 0 0 1 2.75 10L2 3"/>
                        <line x1="5" y1="5.5" x2="5" y2="8.5"/><line x1="7" y1="5.5" x2="7" y2="8.5"/>
                    </svg>
                    <span class="workflow-label">Review <span class="workflow-badge" id="wastebin-count"></span></span>
                </button>
                <button class="workflow-step" id="mode-commander">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="1" y="1" width="4" height="10" rx="0.5"/>
                        <rect x="7" y="1" width="4" height="10" rx="0.5"/>
                        <line x1="2" y1="3.5" x2="4" y2="3.5"/><line x1="2" y1="5.5" x2="4" y2="5.5"/>
                        <line x1="8" y1="3.5" x2="10" y2="3.5"/><line x1="8" y1="5.5" x2="10" y2="5.5"/>
                    </svg>
                    <span class="workflow-label">Organize</span>
                </button>
            </nav>
            <div class="dropdown-wrap">
                <button class="btn btn-sm dropdown-btn" id="settings-btn" title="Settings">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="8" cy="8" r="2.5"/>
                        <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"/>
                    </svg>
                    Settings
                    <svg class="dropdown-chevron" width="8" height="8" viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3l2 2 2-2"/></svg>
                </button>
                <div class="dropdown-menu dropdown-menu-right" id="settings-menu" style="display:none">
                    <div class="dropdown-section">
                        <label class="dropdown-label">Theme</label>
                        <div class="dropdown-toggle">
                            <button class="btn btn-sm" data-theme-set="light">Light</button>
                            <button class="btn btn-sm" data-theme-set="auto">Auto</button>
                            <button class="btn btn-sm" data-theme-set="dark">Dark</button>
                        </div>
                    </div>
                    <div class="dropdown-section">
                        <label class="dropdown-label">Thumbnail quality</label>
                        <div class="dropdown-toggle">
                            <button class="btn btn-sm" data-thumb-quality="standard" title="Faster, uses embedded thumbnail from EXIF if present">Standard</button>
                            <button class="btn btn-sm" data-thumb-quality="high" title="Slower, calculated from full image">High</button>
                        </div>
                    </div>
                    <div class="dropdown-section">
                        <label class="dropdown-label">Interface</label>
                        <div id="settings-hide-ui-wrap"></div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main id="app"></main>

    <div id="ui-hint" class="ui-hint"></div>
    <script src="/js/toggle.js"></script>
    <script src="/js/dropdown.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/browse.js"></script>
    <script src="/js/viewer.js"></script>
    <script src="/js/infopanel.js"></script>
    <script src="/js/progress-dialog.js"></script>
    <script src="/js/commander.js"></script>
    <script src="/js/location-modal.js"></script>
    <script src="/js/batch-rename-modal.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
